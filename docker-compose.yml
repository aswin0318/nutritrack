services:
  postgres:
    image: postgres:16-alpine
    container_name: nutritrack360-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nutritrack
      POSTGRES_PASSWORD: nutritrack_secret
      POSTGRES_DB: nutritrack360
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutritrack -d nutritrack360"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nutritrack360-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutritrack360-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: NutriTrack360
      APP_ENV: development
      APP_DEBUG: "true"
      APP_VERSION: "1.0.0"
      DATABASE_URL: postgresql+asyncpg://nutritrack:nutritrack_secret@postgres:5432/nutritrack360
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev-jwt-secret-change-in-production-please
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nutritrack360-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: ""
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
